<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Avogami Energy – Where Mathematics Meets Terrawatts. Algorithmic trading in electricity markets. Renewable energy reimagined.">
    <title>Avogami Energy | Where Mathematics Meets Terrawatts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap');
        
        :root {
            --logo-green: #166534;
            --logo-light-green: #4ade80;
        }
        
        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, transform;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 200ms;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .hero {
            background: linear-gradient(135deg, #ecfdf5 0%, #f1f5f9 100%);
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 30% 70%, rgba(234, 179, 8, 0.06) 1px, transparent 0),
                radial-gradient(circle at 70% 30%, rgba(16, 165, 233, 0.06) 1px, transparent 0),
                linear-gradient(90deg, transparent 49%, rgba(22, 101, 52, 0.03) 50%, transparent 51%),
                linear-gradient(0deg, transparent 49%, rgba(22, 101, 52, 0.03) 50%, transparent 51%);
            background-size: 80px 80px, 80px 80px, 40px 40px, 40px 40px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
        }
        
        .logo-container {
            filter: drop-shadow(0 25px 25px rgb(22 101 52 / 0.15));
        }
        
        .slogan {
            letter-spacing: -0.04em;
            text-shadow: 0 10px 15px rgba(22, 101, 52, 0.1);
        }
        
        .logo-container img {
            background: transparent;
        }
    </style>
</head>
<body class="bg-slate-50">
    <!-- Ultra-minimal navbar -->
    <nav class="bg-white/90 border-b border-emerald-100 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-5 sm:px-8 py-5 flex items-center">
            <img src="avogami_logo.png?v=2" alt="Avogami Energy Logo" class="h-10 sm:h-12 w-auto">
        </div>
    </nav>

    <!-- Hero – centered transparent logo + slogan -->
    <section class="hero min-h-screen flex items-center">
        <div class="max-w-screen-2xl mx-auto px-5 sm:px-8 hero-content">
            <div class="flex flex-col items-center text-center min-h-[calc(100vh-68px)] pt-[5vh] sm:pt-[10vh]">
                
                <!-- Transparent logo – max 400px wide -->
                <div class="logo-container mb-8 sm:mb-10">
                    <img src="avogami_logo.png?v=2"
                         alt="Avogami Energy Logo"
                         class="max-w-[260px] sm:max-w-[320px] md:max-w-[360px] lg:max-w-[400px] h-auto mx-auto">
                </div>
                
                <!-- Slogan -->
                <h1 class="slogan text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-semibold logo-font text-[#166534] tracking-[-2px] leading-none max-w-4xl">
                    Where Mathematics<br>Meets TerraWatts
                </h1>
                
                <!-- Subtle tagline -->
                <p class="mt-6 sm:mt-8 text-[#4ade80] text-lg sm:text-xl font-light tracking-wide">
                    Algorithmic power trading • Renewable energy redefined
                </p>
            </div>
        </div>
    </section>

    <!-- Minimal footer -->
    <footer class="bg-white border-t border-emerald-100 py-8 text-center text-xs text-slate-400">
        <div class="max-w-screen-2xl mx-auto px-5 sm:px-8 flex flex-col sm:flex-row justify-between items-center gap-y-4">
            <div>© 2026 Avogami Energy • Mathematics. Terrawatts. Renewables.</div>
            <div class="flex gap-x-6">
                <a href="https://www.linkedin.com/company/avogami/" target="_blank" class="hover:text-[#166534] flex items-center gap-x-1">
                    <i class="fa-brands fa-linkedin"></i>
                    LinkedIn
                </a>
            </div>
            <div class="flex items-center gap-x-1 text-emerald-600">
                <i class="fa-solid fa-leaf"></i>
                100% renewable-powered vision
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('%c✅ Avogami Energy homepage – transparent logo ready', 'background:#166534;color:#fff;padding:4px 8px;border-radius:9999px;font-family:Space Grotesk');
        });
    </script>
</body>
</html>
